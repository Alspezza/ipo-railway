<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — FOTERA</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .form-card h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 24px;
            color: #1a202c;
            text-align: center;
            font-weight: 600;
        }
        /* Стилизация стандартных полей Django */
        .form-card p {
            margin-bottom: 16px;
        }
        .form-card label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
        }
        .form-card input[type="text"],
        .form-card input[type="email"],
        .form-card input[type="password"],
        .form-card textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            color: #334155;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-card input:focus, .form-card textarea:focus {
            outline: none;
            border-color: #0066cc;
        }
        .form-card textarea {
            resize: vertical;
        }
        /* Синяя кнопка в стиле «Применить фильтры» */
        .btn-submit {
            width: 100%;
            background-color: #0066ff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0052cc;
        }
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }
        .form-footer a {
            color: #0066ff;
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        .errorlist {
            color: #e53e3e;
            padding-left: 20px;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Регистрация нового профиля</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Зарегистрироваться</button>
    </form>
    <div class="form-footer">
        Уже зарегистрированы? <a href="{% url 'login' %}">Войти</a>
    </div>
</div>

</body>
</html>
