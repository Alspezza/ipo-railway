<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; color: #333333;">

    <div style="max-width: 1100px; margin: 0 auto; padding: 40px 20px; box-sizing: border-box;">
        
        <!-- БЛОК ОШИБКИ: ЕСЛИ НЕ ВОШЕЛ -->
        <div id="unauth-block" style="display: none; background: #ffffff; border: 1px solid #e3e6f0; border-radius: 8px; padding: 40px; text-align: center; box-shadow: 0 4px 25px rgba(0,0,0,0.05); margin-top: 50px;">
            <h3 style="color: #dc3545; margin-top: 0; margin-bottom: 15px; font-weight: 500; font-size: 24px;">Вы не авторизованы</h3>
            <p style="color: #6c757d; margin-bottom: 25px; font-size: 16px;">Для доступа к личному кабинету необходимо войти в аккаунт.</p>
            <a href="/login/" style="background-color: #0066ff; color: #ffffff; text-decoration: none; padding: 12px 30px; border-radius: 6px; font-weight: 500; display: inline-block;">Войти в систему</a>
        </div>

        <!-- ИНТЕРФЕЙС ЛИЧНОГО КАБИНЕТА -->
        <div id="cabinet-block">
            
            <!-- ВЕРХНЯЯ ПАНЕЛЬ (ШАПКА) -->
            <div style="display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 20px 25px; border-radius: 8px; border: 1px solid #e3e6f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
                <h2 style="margin: 0; font-weight: 500; font-size: 26px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px;">
                    Личный кабинет 
                    <span id="badge-role" style="font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 20px; color: #ffffff; text-transform: uppercase; background-color: #0066ff;">Покупатель</span>
                </h2>
                <div style="display: flex; gap: 10px;">
                    <a href="/settings/" style="background-color: #6c757d; color: #ffffff; text-decoration: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; display: inline-block;">Настройки</a>
                    <a href="/catalog/" style="background-color: #0066ff; color: #ffffff; text-decoration: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; display: inline-block;">В каталог</a>
                    <form method="post" action="/logout/" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" style="background-color: #dc3545; color: #ffffff; border: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;">Выйти</button>
                    </form>
                </div>
            </div>

            <!-- УВЕДОМЛЕНИЕ ОБ УСПЕШНОМ СОХРАНЕНИИ -->
            <div id="cabinet-alert" style="display: none; padding: 12px; margin-bottom: 25px; border-radius: 6px; text-align: center; font-size: 14px; font-weight: 500; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; box-shadow: 0 2px 10px rgba(40,167,69,0.1);"></div>

            <!-- ДВУХКОЛОНОЧНЫЙ БЛОК КОНТЕНТА -->
            <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                
                <!-- ЛЕВАЯ КОЛОНКА: ФОРМА ПРОФИЛЯ -->
                <div style="flex: 1; min-width: 350px; background: #ffffff; border: 1px solid #e3e6f0; border-radius: 8px; padding: 25px; box-sizing: border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
                    <h3 style="margin-top: 0; margin-bottom: 20px; font-weight: 500; font-size: 20px; color: #333333; border-bottom: 1px solid #f1f3f9; padding-bottom: 12px;">Мой профиль</h3>
                    
                    <form id="profile-form" style="display: flex; flex-direction: column; gap: 16px;">
                        <div>
                            <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #555555;">ФИО:</label>
                            <input type="text" id="prof-name" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; background: #ffffff;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #555555;">Телефон:</label>
                            <input type="text" id="prof-phone" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; background: #ffffff;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #555555;">Адрес доставки:</label>
                            <textarea id="prof-address" rows="2" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; resize: none; font-family: inherit; background: #ffffff;"></textarea>
                        </div>
                        
                        <!-- СПЕЦИФИЧНЫЕ ПОЛЯ МАГАЗИНА (ИНДИВИДУАЛЬНОЕ ЗАДАНИЕ) -->
                        <div style="background-color: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #e3e6f0; margin-top: 5px;">
                            <span style="display: block; font-size: 11px; color: #4e73df; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Параметры магазина гаджетов</span>
                            <div style="margin-bottom: 12px;">
                                <label style="display: block; margin-bottom: 5px; font-size: 13px; font-weight: 500; color: #444444;">Город доставки:</label>
                                <input type="text" id="prof-city" style="width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 13px; outline: none; background: #ffffff;">
                            </div>
                            <div>
                                <label style="display: block; margin-bottom: 5px; font-size: 13px; font-weight: 500; color: #444444;">Любимая категория:</label>
                                <select id="prof-cat" style="width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 13px; background-color: #ffffff; outline: none; cursor: pointer;">
                                    <option value="Смартфоны">Смартфоны</option>
                                    <option value="Ноутбуки">Ноутбуки</option>
                                    <option value="Аудио">Аудио & Наушники</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" style="background-color: #28a745; color: #ffffff; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 5px;">Сохранить изменения</button>
                    </form>
                </div>

                <!-- ПРАВАЯ КОЛОНКА: ИСТОРИЯ ЗАКАЗОВ -->
                <div style="flex: 1.4; min-width: 450px; background: #ffffff; border: 1px solid #e3e6f0; border-radius: 8px; padding: 25px; box-sizing: border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
                    <h3 style="margin-top: 0; margin-bottom: 20px; font-weight: 500; font-size: 20px; color: #333333; border-bottom: 1px solid #f1f3f9; padding-bottom: 12px;">История заказов</h3>
                    
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                            <thead>
                                <tr style="border-bottom: 2px solid #e3e6f0; color: #495057; background-color: #f8f9fa;">
                                    <th style="padding: 12px 10px; font-weight: 600;">ID</th>
                                    <th style="padding: 12px 10px; font-weight: 600;">Покупатель</th>
                                    <th style="padding: 12px 10px; font-weight: 600;">Сумма</th>
                                    <th style="padding: 12px 10px; font-weight: 600;">Статус</th>
                                    <th style="padding: 12px 10px; font-weight: 600; text-align: center;">Действие</th>
                                </tr>
                            </thead>
                            <tbody id="orders-tbody">
                                <!-- Сюда динамически подгрузятся данные через Fetch -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        window.onload = function() {
            fetch('/api/me/')
            .then(res => {
                if (res.status === 200) return res.json();
                document.getElementById('cabinet-block').style.display = 'none';
                document.getElementById('unauth-block').style.display = 'block';
                return null;
            })
            .then(data => {
                if (data) {
                    renderCabinet(data);
                }
            });
        };

        function renderCabinet(userData) {
            const badge = document.getElementById('badge-role');
            const isAdmin = userData.profile.role === 'ADMIN';
            
            badge.innerText = isAdmin ? 'Администратор' : 'Покупатель';
            badge.style.backgroundColor = isAdmin ? '#dc3545' : '#0066ff';

            document.getElementById('prof-name').value = userData.profile.full_name || '';
            document.getElementById('prof-phone').value = userData.profile.phone || '';
            document.getElementById('prof-address').value = userData.profile.address || '';
            document.getElementById('prof-city').value = userData.profile.delivery_city || '';
            document.getElementById('prof-cat').value = userData.profile.favorite_category || 'Смартфоны';

            loadOrders();
        }

        function loadOrders() {
            fetch('/api/orders/')
            .then(res => res.json())
            .then(orders => {
                const tbody = document.getElementById('orders-tbody');
                tbody.innerHTML = '';
                
                if (!orders || orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding: 20px; text-align: center; color: #888888; font-style: italic;">У вас пока нет оформленных заказов.</td></tr>';
                    return;
                }
                
                orders.forEach(order => {
                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid #f1f3f9;">
                            <td style="padding: 12px 10px; font-weight: 600; color: #333333;">#${order.id}</td>
                            <td style="padding: 12px 10px; color: #555555;">${order.username}</td>
                            <td style="padding: 12px 10px; color: #28a745; font-weight: 600;">${order.total_amount} BYN</td>
                            <td style="padding: 12px 10px;"><span style="background: #e2e3e5; color: #41464b; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; display: inline-block;">${order.status}</span></td>
                            <td style="padding: 12px 10px; text-align: center;"><button style="background: transparent; border: 1px solid #0066ff; color: #0066ff; padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer;" onclick="alert('Детали заказа №' + ${order.id} + '\\nПокупатель: ' + '${order.username}' + '\\nИтого к оплате: ' + '${order.total_amount} BYN\\nСтатус: ' + '${order.status}')">Подробнее</button></td>
                        </tr>`;
                });
            });
        }

        document.getElementById('profile-form').onsubmit = function(e) {
            e.preventDefault();
            fetch('/api/me/', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    full_name: document.getElementById('prof-name').value,
                    phone: document.getElementById('prof-phone').value,
                    address: document.getElementById('prof-address').value,
                    delivery_city: document.getElementById('prof-city').value,
                    favorite_category: document.getElementById('prof-cat').value
                })
            })
            .then(res => {
                if (res.status === 200) {
                    const alertBox = document.getElementById('cabinet-alert');
                    alertBox.style.display = 'block';
                    alertBox.innerText = 'Профиль успешно обновлен!';
                    setTimeout(() => alertBox.style.display = 'none', 4000);
                    return res.json();
                }
            })
            .then(data => {
                if (data) renderCabinet(data);
            });
        };
    </script>
</body>
</html>
