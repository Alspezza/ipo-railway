{% extends 'base.html' %}

{% block title %}Главная{% endblock %}

{% block content %}
<!-- Hero секция -->
<div class="bg-light p-5 rounded mb-4 text-center">
    <h1>Fotera</h1>
    <p>Лучшие товары по выгодным ценам</p>
    <a href="{% url 'catalog' %}" class="btn btn-primary">Перейти в каталог</a>
</div>

<!-- Популярные товары -->
<h2 class="mb-3">Популярные товары</h2>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5>{{ product.name }}</h5>
                <p>{{ product.price }} руб.</p>
                <a href="{% url 'product_detail' product.id %}" class="btn btn-sm btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>


{% endblock %}
